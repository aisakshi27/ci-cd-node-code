name : Run Test
on: 
  push:
    branches: [ main ]
    path-ignore:
      - 'github/workflows/**'
    workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Cloning repository
      uses: actions/checkout@v6
    - name: Set up Node.js and cache node modules
      uses: ./.github/actions/setupnode
      with:
        node-version: '14'
    - name: Run tests
      run: npm test
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      with:
        args: >
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          -Dsonar.projectKey=aisakshi27_ci-cd-node-code
          -Dsonar.organization=sonarsak27
          -Dsonar.host.url=https://sonarcloud.io  
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Cloning repository
      uses: actions/checkout@v6
    - name: Set up Node.js and cache node modules
      uses: ./.github/actions/setupnode
      with:
        node-version: '14'
    - name: Build project
      run: npm run build
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Cloning repository
      uses: actions/checkout@v6
    - name: Deploy to GitHub Pages
      run: echo "Deploying to GitHub Pages..."

